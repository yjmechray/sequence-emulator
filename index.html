<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sequence Control Wiring Emulator</title>
  <style>
    :root {
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #1e293b;
      --border: #cbd5e1;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #ef4444;
      --success: #10b981;
      
      /* Panel Colors */
      --panel-bg: linear-gradient(180deg, #e2e8f0 0%, #cbd5e1 100%);
      --panel-border: #94a3b8;
      
      /* Terminal Colors */
      --term-red: radial-gradient(circle at 30% 30%, #fca5a5, #dc2626 40%, #7f1d1d);
      --term-yellow: radial-gradient(circle at 30% 30%, #fef08a, #eab308 40%, #854d0e);
      --term-blue: radial-gradient(circle at 30% 30%, #93c5fd, #2563eb 40%, #1e3a8a);
    }

    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Header & Toolbar */
    header {
      background: var(--card);
      padding: 0.75rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      z-index: 10;
    }

    .title-area h1 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 600;
    }

    .title-area p {
      margin: 0.2rem 0 0;
      font-size: 0.8rem;
      color: #64748b;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
    }

    select, button {
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 0.4rem;
      font-size: 0.85rem;
      background: var(--card);
      cursor: pointer;
      transition: all 0.2s;
    }

    button:hover { background: #f8fafc; }
    
    button.primary {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      font-weight: 500;
    }
    button.primary:hover { background: var(--primary-hover); }

    /* Hint Animation */
    @keyframes flashHint {
      0%, 100% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0.8); transform: scale(1.2); background: #86efac; }
      50% { box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.4); transform: scale(1); }
    }
    .hint-flash {
      animation: flashHint 1.5s infinite !important;
      z-index: 30;
    }

    /* Top Thin Status Bar */
    .status-bar {
      background: #eff6ff;
      color: #1e3a8a;
      padding: 0.4rem 1rem;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 500;
      border-bottom: 1px solid #bfdbfe;
      border-top: 1px solid #bfdbfe;
      flex-shrink: 0;
      z-index: 9;
      transition: background 0.3s, color 0.3s;
    }

    .status-bar.error {
      background: #fef2f2;
      color: #991b1b;
      border-color: #fecaca;
    }

    .status-bar.short {
      background: #fef2f2;
      color: #dc2626;
      border-color: #ef4444;
      font-weight: bold;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
    }

    /* Main Workspace */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
      flex-direction: row;
    }

    /* Left Sidebar: Collapsible Sections */
    .sidebar {
      width: 300px;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 5;
      flex-shrink: 0;
      transition: width 0.3s ease;
    }

    .sidebar.collapsed {
      width: 0;
      border-right: none;
    }

    .sidebar-content {
      width: 300px;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow-y: auto;
      transition: opacity 0.2s ease;
    }

    .sidebar.collapsed .sidebar-content {
      opacity: 0;
      pointer-events: none;
    }

    .collapsible-panel {
      border-bottom: 1px solid var(--border);
    }
    
    .collapsible-panel summary {
      padding: 0.75rem 1rem;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      background: #f8fafc;
      list-style: none;
      user-select: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .collapsible-panel summary::-webkit-details-marker { display: none; }
    
    .collapsible-panel summary::after {
      content: '▼';
      font-size: 0.7rem;
      color: #64748b;
      transition: transform 0.2s;
    }
    
    .collapsible-panel[open] summary::after {
      transform: rotate(-180deg);
    }

    /* Schematic Diagram */
    .diagram-container {
      padding: 0.75rem;
      background: #ffffff;
    }
    .diagram-container svg {
      width: 100%;
      height: auto;
      max-height: 250px;
      display: none;
    }
    .diagram-container svg.active {
      display: block;
    }
    .dw { stroke: #1e293b; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .dt { font: 14px 'Segoe UI', sans-serif; fill: #1e293b; }
    .dt.bold { font-weight: bold; font-size: 16px; }
    .d-red { fill: #dc2626; font-weight: bold; }
    .d-green { fill: #16a34a; font-weight: bold; }

    /* Compact Connections List */
    .wire-list-compact {
      padding: 0.5rem;
      background: #f8fafc;
      max-height: 30vh;
      overflow-y: auto;
    }

    .wire-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.25rem 0.5rem;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 0.25rem;
      margin-bottom: 0.25rem;
      font-size: 0.7rem;
      font-family: monospace;
    }

    .wire-item button {
      padding: 0.15rem 0.4rem;
      background: #fee2e2;
      color: #dc2626;
      border: none;
      border-radius: 0.25rem;
      font-size: 0.65rem;
      cursor: pointer;
    }
    .wire-item button:hover { background: #fecaca; }

    /* Right Area: The Physical Board (Centerpiece) */
    .board-container {
      flex: 1;
      position: relative;
      background: radial-gradient(circle at 50% 50%, #f8fafc, #e2e8f0);
      overflow: auto;
      padding: 1.5rem;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      -webkit-overflow-scrolling: touch;
    }

    .board {
      position: relative;
      width: 1000px;
      height: 700px;
      background: #d1d5db;
      border: 4px solid #94a3b8;
      border-radius: 12px;
      box-shadow: 
        inset 0 0 20px rgba(0,0,0,0.05),
        0 20px 25px -5px rgba(0, 0, 0, 0.1);
      margin: 0 auto;
      flex-shrink: 0;
    }

    /* SVG Layer for Wires */
    #wire-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 20;
    }

    .wire-path {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.15));
      pointer-events: stroke;
      cursor: pointer;
      transition: stroke-width 0.2s, stroke 0.2s;
    }
    
    .wire-path:hover {
      stroke-width: 6;
      stroke: #3b82f6 !important;
    }

    .wire-temp {
      fill: none;
      stroke: #94a3b8;
      stroke-width: 3;
      stroke-dasharray: 6 6;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    /* Hardware Modules */
    .module {
      position: absolute;
      background: var(--panel-bg);
      border: 2px solid var(--panel-border);
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.5rem;
    }

    .module-screws::before, .module-screws::after {
      content: '';
      position: absolute;
      width: 6px; height: 6px;
      background: #64748b;
      border-radius: 50%;
      box-shadow: inset 1px 1px 2px rgba(0,0,0,0.5);
    }
    .module-screws::before { top: 6px; left: 6px; }
    .module-screws::after { bottom: 6px; right: 6px; }

    .module-title {
      font-size: 0.75rem;
      font-weight: bold;
      background: #94a3b8;
      color: white;
      padding: 0.1rem 1rem;
      border-radius: 4px;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Terminals (Sockets) - Made smaller to fit neatly inside panels */
    .terminal-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }

    .terminal {
      width: 18px; /* Reduced from 24px */
      height: 18px; /* Reduced from 24px */
      border-radius: 50%;
      border: 2px solid #334155; /* Reduced border thickness */
      box-shadow: 0 1px 2px rgba(255,255,255,0.8), inset 0 2px 4px rgba(0,0,0,0.6);
      position: relative;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .terminal::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 6px; /* Reduced from 10px */
      height: 6px; /* Reduced from 10px */
      background: #020617;
      border-radius: 50%;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.8);
    }

    .terminal:hover { transform: scale(1.2); }
    .terminal.selected {
      transform: scale(1.2);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.5);
    }

    .term-red { background: var(--term-red); }
    .term-yellow { background: var(--term-yellow); }
    .term-blue { background: var(--term-blue); }

    /* Specific Module Layouts */
    .grid-row { display: flex; gap: 0.5rem; justify-content: center; } /* Reduced gap */
    .grid-col { display: flex; flex-direction: column; gap: 0.25rem; align-items: center; } /* Reduced gap */
    
    .symbol {
      font-size: 0.65rem;
      color: #475569;
      font-weight: 600;
      text-align: center;
      margin: 0.15rem 0;
    }

    /* Push Button Elements */
    .pb-actuator {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 2px solid #94a3b8;
      background: radial-gradient(circle at 30% 30%, #f8fafc, #cbd5e1 60%);
      box-shadow: 0 4px 0 #94a3b8, 0 5px 5px rgba(0,0,0,0.2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.7rem;
      margin-bottom: 0.5rem;
      user-select: none;
      transition: all 0.1s;
    }
    
    .pb-actuator:active, .pb-actuator.pressed {
      transform: translateY(4px);
      box-shadow: 0 0 0 #94a3b8, 0 1px 2px rgba(0,0,0,0.2);
    }

    /* Lamp Elements */
    .lamp-dome {
      width: 50px; height: 50px;
      border-radius: 50%;
      margin-bottom: 0.5rem;
      border: 4px solid #64748b;
      box-shadow: inset 0 4px 8px rgba(255,255,255,0.4), 0 4px 6px rgba(0,0,0,0.2);
      transition: all 0.2s;
    }
    
    .lamp-red { background: radial-gradient(circle at 30% 30%, #fca5a5, #991b1b); }
    .lamp-green { background: radial-gradient(circle at 30% 30%, #86efac, #166534); }
    
    .lamp-red.on {
      background: radial-gradient(circle at 40% 40%, #ffbaba, #ff0000);
      box-shadow: 0 0 30px #ff0000, inset 0 4px 8px rgba(255,255,255,0.6);
    }
    
    .lamp-green.on {
      background: radial-gradient(circle at 40% 40%, #baffc9, #00ff00);
      box-shadow: 0 0 30px #00ff00, inset 0 4px 8px rgba(255,255,255,0.6);
    }

    /* Relay Indicator */
    .relay-indicator {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #475569;
      margin-bottom: 0.5rem;
    }
    .relay-indicator.on {
      background: #ef4444;
      box-shadow: 0 0 8px #ef4444;
    }

    /* Mobile Responsive Overrides */
    @media (max-width: 768px) {
      .workspace { flex-direction: column; }
      .sidebar { 
        width: 100%; 
        border-right: none; 
        border-bottom: 1px solid var(--border); 
        max-height: 40vh;
        transition: max-height 0.3s ease, opacity 0.3s ease;
      }
      .sidebar-content { width: 100%; }
      .sidebar.collapsed {
        width: 100%;
        max-height: 0;
        border-bottom: none;
        opacity: 0;
      }
      .board-container { padding: 0.5rem; }
      header { align-items: flex-start; }
      .controls { width: 100%; justify-content: space-between; }
      select { flex: 1; }
    }
  </style>
</head>
<body>

  <header>
    <div class="title-area">
      <h1>시퀀스 제어 에뮬레이터 (Sequence Control Emulator)</h1>
      <p>전기 논리 회로 실습 보드 (Interactive electrical logic training board)</p>
    </div>
    <div class="controls">
      <select id="lesson-select">
        <option value="a_contact">1. a접점 회로 (a-contact Circuit)</option>
        <option value="b_contact">2. b접점 회로 (b-contact Circuit)</option>
        <option value="c_contact">3. c접점 회로 (c-contact Circuit)</option>
        <option value="and_circuit">4. 직렬 회로 (Series AND Circuit)</option>
        <option value="or_circuit">5. 병렬 회로 (Parallel OR Circuit)</option>
      </select>
      <button onclick="toggleSidebar()" id="sidebar-toggle-btn">사이드바 숨기기 (Hide Sidebar)</button>
      <button onclick="clearWires()">초기화 (Clear)</button>
      <button onclick="showHint()">힌트 (Hint)</button>
      <button class="primary" onclick="loadLessonTarget()">정답 불러오기 (Load Target)</button>
    </div>
  </header>

  <!-- Thin Status Bar -->
  <div id="status-panel" class="status-bar">
    두 단자를 클릭하여 전선을 연결하세요. 버튼을 눌러 테스트하세요. (Click two terminals to connect a wire. Press buttons to test.)
  </div>

  <div class="workspace">
    
    <!-- Sidebar / Collapsible Menus -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-content">
        <details class="collapsible-panel" open>
          <summary>회로도 (Schematic Diagram)</summary>
          <div id="diagram-container" class="diagram-container">
            
            <!-- 1. a접점 회로 -->

              <text x="75" y="65" class="dt">PB</text>

              <text x="55" y="119" class="dt">X</text>
              <path class="dw" d="M 140 30 V 50 M 140 80 V 100" />

              <circle cx="140" cy="115" r="15" class="dw" />

            </svg>

            <!-- 2. b접점 회로 -->
            <svg id="diag_b_contact" viewBox="0 0 200 160">
              <path class="dw" d="M 20 30 H 180 M 20 130 H 180" />
              <text x="5" y="34" class="dt bold">R</text>
              <text x="5" y="134" class="dt bold">T</text>
              <path class="dw" d="M 60 30 V 50 M 60 80 V 100" />
              <path class="dw" d="M 50 50 H 70 M 50 80 H 70 L 50 50" />
              <text x="75" y="65" class="dt">PB</text>
              <circle cx="60" cy="115" r="15" class="dw" />
              <text x="55" y="119" class="dt">X</text>
              <path class="dw" d="M 140 30 V 50 M 140 80 V 100" />
              <path class="dw" d="M 130 50 H 150 M 130 80 H 150 L 130 50" />
              <text x="155" y="65" class="dt">X</text>
              <circle cx="140" cy="115" r="15" class="dw" />
              <text x="130" y="119" class="dt d-green">GL</text>
            </svg>

            <!-- 3. c접점 회로 -->
            <svg id="diag_c_contact" viewBox="0 0 240 160">
              <path class="dw" d="M 20 30 H 220 M 20 130 H 220" />

              <circle cx="120" cy="115" r="15" class="dw" />

            <!-- 4. 직렬 (AND) 회로 -->

              <path class="dw" d="M 170 80 V 95 M 170 125 V 135" />

              <text x="135" y="115" class="dt">PB2</text>
              <path class="dw" d="M 170 85 H 210 V 95 M 210 125 V 130 H 170" />
              <path class="dw" d="M 200 95 H 220 M 200 125 L 220 110" />
              <text x="225" y="115" class="dt">X2</text>
              <circle cx="170" cy="145" r="10" class="dw" />
              <text x="162" y="149" class="dt">X2</text>
              <path class="dw" d="M 260 80 V 90 M 260 110 V 115 M 260 135 V 140" />
              <path class="dw" d="M 250 90 H 270 M 250 110 L 270 95" />
              <text x="275" y="105" class="dt">X1</text>
              <path class="dw" d="M 250 115 H 270 M 250 135 L 270 120" />
              <text x="275" y="130" class="dt">X2</text>
              <circle cx="260" cy="150" r="10" class="dw" />

            </svg>

            <!-- 5. 병렬 (OR) 회로 -->
            <svg id="diag_or_circuit" viewBox="0 0 320 180">
              <path class="dw" d="M 20 30 H 300 M 20 160 H 300" />
              <text x="5" y="34" class="dt bold">R</text>

              <path class="dw" d="M 110 95 H 130 M 110 125 L 130 110" />
              <text x="135" y="115" class="dt">X1</text>

              <path class="dw" d="M 280 95 H 300 M 280 125 L 300 110" />
              <text x="305" y="115" class="dt">X2</text>
              <circle cx="250" cy="145" r="10" class="dw" />

            </svg>
          </div>
        </details>

        <details class="collapsible-panel" open>
          <summary>연결 (Connections) (<span id="wire-count">0</span>)</summary>
          <div id="wire-container" class="wire-list-compact">
            <div style="font-size: 0.75rem; color: #64748b; padding: 0.25rem;">연결 없음 (No connections).</div>
          </div>
        </details>
      </div>
    </div>

    <!-- Right Side / Board -->
    <div class="board-container" id="scroll-container">
      <div class="board" id="board">
        <svg id="wire-layer">
          <path id="temp-wire" class="wire-temp" d="" />
        </svg>
      </div>
    </div>
  </div>

  <script>
    // --- 1. ARCHITECTURE & DEFINITIONS ---
    const board = document.getElementById('board');
    const wireLayer = document.getElementById('wire-layer');
    const tempWire = document.getElementById('temp-wire');
    const statusPanel = document.getElementById('status-panel');
    const wireContainer = document.getElementById('wire-container');
    const scrollContainer = document.getElementById('scroll-container');
    const lessonSelect = document.getElementById('lesson-select');

    let wires = [];
    let selectedTerminal = null;
    let isShortCircuit = false;
    let mousePos = { x: 0, y: 0 };
    
    const state = {
      pb1: false, pb2: false, pb3: false,
      x1: false, x2: false,
      rl: false, gl: false
    };

    const wireColors = ['#e11d48', '#2563eb', '#16a34a', '#d97706', '#4f46e5', '#db2777'];

    // --- 2. LESSON DATA ---
    const lessons = {
      a_contact: [
        {a: 'pow_R', b: 'pb1_no_top'},
        {a: 'pb1_no_bot', b: 'x1_coil_top'},
        {a: 'x1_coil_bot', b: 'pow_T'},
        {a: 'pow_R', b: 'x1_no1_top'},
        {a: 'x1_no1_bot', b: 'rl_top'},
        {a: 'rl_bot', b: 'pow_T'}
      ],
      b_contact: [
        {a: 'pow_R', b: 'pb1_nc_top'},
        {a: 'pb1_nc_bot', b: 'x1_coil_top'},
        {a: 'x1_coil_bot', b: 'pow_T'},
        {a: 'pow_R', b: 'x1_nc1_top'},
        {a: 'x1_nc1_bot', b: 'gl_top'},
        {a: 'gl_bot', b: 'pow_T'}
      ],
      c_contact: [
        {a: 'pow_R', b: 'pb1_no_top'},
        {a: 'pb1_no_bot', b: 'x1_coil_top'},
        {a: 'x1_coil_bot', b: 'pow_T'},
        {a: 'pow_R', b: 'x1_no1_top'},
        {a: 'x1_no1_bot', b: 'rl_top'},
        {a: 'rl_bot', b: 'pow_T'},
        {a: 'pow_R', b: 'x1_nc1_top'},
        {a: 'x1_nc1_bot', b: 'gl_top'},
        {a: 'gl_bot', b: 'pow_T'}
      ],
      and_circuit: [
        {a: 'pow_R', b: 'pb3_nc_top'},
        {a: 'pb3_nc_bot', b: 'pb1_no_top'},
        {a: 'pb1_no_bot', b: 'x1_coil_top'},
        {a: 'x1_coil_bot', b: 'pow_T'},
        {a: 'pb3_nc_bot', b: 'x1_no1_top'},
        {a: 'x1_no1_bot', b: 'x1_coil_top'},
        
        {a: 'pb3_nc_bot', b: 'pb2_no_top'},
        {a: 'pb2_no_bot', b: 'x2_coil_top'},
        {a: 'x2_coil_bot', b: 'pow_T'},
        {a: 'pb3_nc_bot', b: 'x2_no1_top'},
        {a: 'x2_no1_bot', b: 'x2_coil_top'},
        
        {a: 'pb3_nc_bot', b: 'x1_no2_top'},
        {a: 'x1_no2_bot', b: 'x2_no2_top'}, 
        {a: 'x2_no2_bot', b: 'rl_top'},
        {a: 'rl_bot', b: 'pow_T'}
      ],
      or_circuit: [
        {a: 'pow_R', b: 'pb3_nc_top'},
        {a: 'pb3_nc_bot', b: 'pb1_no_top'},
        {a: 'pb1_no_bot', b: 'x1_coil_top'},
        {a: 'x1_coil_bot', b: 'pow_T'},
        {a: 'pb3_nc_bot', b: 'x1_no1_top'},
        {a: 'x1_no1_bot', b: 'x1_coil_top'},
        
        {a: 'pb3_nc_bot', b: 'pb2_no_top'},
        {a: 'pb2_no_bot', b: 'x2_coil_top'},
        {a: 'x2_coil_bot', b: 'pow_T'},
        {a: 'pb3_nc_bot', b: 'x2_no1_top'},
        {a: 'x2_no1_bot', b: 'x2_coil_top'},
        
        {a: 'pb3_nc_bot', b: 'x1_no2_top'},
        {a: 'x1_no2_bot', b: 'rl_top'},
        {a: 'pb3_nc_bot', b: 'x2_no2_top'}, 
        {a: 'x2_no2_bot', b: 'rl_top'},
        {a: 'rl_bot', b: 'pow_T'}
      ]
    };

    lessonSelect.addEventListener('change', (e) => {
      document.querySelectorAll('#diagram-container svg').forEach(svg => svg.classList.remove('active'));
      const activeSvg = document.getElementById('diag_' + e.target.value);
      if(activeSvg) activeSvg.classList.add('active');
      clearWires();
    });

    // --- 3. HARDWARE RENDERING ---
    function createModule(id, x, y, width, height, title, contentHTML) {
      const mod = document.createElement('div');
      mod.className = 'module module-screws';
      mod.id = id;
      mod.style.left = `${x}px`;
      mod.style.top = `${y}px`;
      mod.style.width = `${width}px`;
      mod.style.height = `${height}px`;
      mod.innerHTML = `<div class="module-title">${title}</div>${contentHTML}`;
      board.appendChild(mod);
    }

    function buildHardware() {
      // 1. Power Supply (Top Left)
      createModule('power', 40, 40, 140, 100, '전원 (POWER)', `
        <div class="grid-row" style="margin-top:10px;">
          <div class="grid-col"><div class="terminal term-red" id="pow_R"></div><div class="symbol">R</div></div>
          <div class="grid-col"><div class="terminal term-red" id="pow_T"></div><div class="symbol">T</div></div>
        </div>
      `);

      // 2. Separate Push Buttons (Top Middle)
      for(let i=1; i<=3; i++) {
        let pbHTML = `
          <div class="grid-col">
            <div class="pb-actuator" id="btn_pb${i}" onmousedown="pressPB('pb${i}', true)" onmouseup="pressPB('pb${i}', false)" onmouseleave="pressPB('pb${i}', false)" ontouchstart="pressPB('pb${i}', true)" ontouchend="pressPB('pb${i}', false)">PB${i}</div>
            <div class="grid-row" style="gap:8px;">
              <div class="grid-col">
                <div class="terminal term-yellow" id="pb${i}_no_top"></div>
                <div class="symbol">NO</div>
                <div class="terminal term-yellow" id="pb${i}_no_bot"></div>
              </div>
              <div class="grid-col">
                <div class="terminal term-blue" id="pb${i}_nc_top"></div>
                <div class="symbol">NC</div>
                <div class="terminal term-blue" id="pb${i}_nc_bot"></div>
              </div>
            </div>
          </div>`;
        // PB1: 195, PB2: 330, PB3: 465. Made narrower to tightly encapsulate contents
        createModule(`pb${i}_mod`, 60 + (i * 135), 40, 120, 190, `버튼 (PB${i})`, pbHTML);
      }

      // 3. Lamps (Top Right)
      const lamps = [
        { id: 'rl', color: 'red', name: '램프 (RL)', x: 620 },
        { id: 'gl', color: 'green', name: '램프 (GL)', x: 740 }
      ];
      lamps.forEach(l => {
        createModule(`lamp_${l.id}`, l.x, 40, 100, 190, l.name, `
          <div class="lamp-dome lamp-${l.color}" id="dome_${l.id}"></div>
          <div class="grid-col">
            <div class="terminal term-red" id="${l.id}_top"></div>
            <div class="terminal term-red" id="${l.id}_bot"></div>
          </div>
        `);
      });

      // 4. Relays (Bottom Row)
      [1, 2].forEach((num, idx) => {
        let relayHTML = `<div class="relay-indicator" id="ind_x${num}"></div><div class="grid-row" style="gap:8px;">`;
        relayHTML += `<div class="grid-col"><div class="terminal term-red" id="x${num}_coil_top"></div><div class="symbol">R</div><div class="terminal term-red" id="x${num}_coil_bot"></div></div>`;
        for(let i=1; i<=4; i++) {
          relayHTML += `<div class="grid-col"><div class="terminal term-yellow" id="x${num}_no${i}_top"></div><div class="symbol">NO</div><div class="terminal term-yellow" id="x${num}_no${i}_bot"></div></div>`;
        }
        for(let i=1; i<=4; i++) {
          relayHTML += `<div class="grid-col"><div class="terminal term-blue" id="x${num}_nc${i}_top"></div><div class="symbol">NC</div><div class="terminal term-blue" id="x${num}_nc${i}_bot"></div></div>`;
        }
        relayHTML += '</div>';
        createModule(`relay${num}`, 40 + (idx * 380), 280, 360, 160, `릴레이 (X${num})`, relayHTML);
      });

      document.querySelectorAll('.terminal').forEach(term => {
        term.addEventListener('click', (e) => handleTerminalClick(e, term));
      });
    }

    // --- 4. INTERACTION & DRAWING ---
    function handleTerminalClick(e, term) {
      // Remove any active hints when user starts interacting
      document.querySelectorAll('.hint-flash').forEach(el => el.classList.remove('hint-flash'));

      if (!selectedTerminal) {
        selectedTerminal = term;
        term.classList.add('selected');
        updateStatus("두 번째 단자를 선택하세요 (Select a second terminal to connect the wire).");
      } else {
        if (selectedTerminal !== term) {
          addWire(selectedTerminal.id, term.id);
        }
        selectedTerminal.classList.remove('selected');
        selectedTerminal = null;
        tempWire.setAttribute('d', '');
      }
    }

    board.addEventListener('mousemove', (e) => {
      if (!selectedTerminal) return;
      const rect = board.getBoundingClientRect();
      mousePos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
      const termRect = selectedTerminal.getBoundingClientRect();
      const startX = termRect.left - rect.left + (termRect.width/2);
      const startY = termRect.top - rect.top + (termRect.height/2);
      const midY = (startY + mousePos.y) / 2;
      tempWire.setAttribute('d', `M ${startX} ${startY} L ${startX} ${midY} L ${mousePos.x} ${midY} L ${mousePos.x} ${mousePos.y}`);
    });

    function addWire(idA, idB) {
      if (wires.some(w => (w.a === idA && w.b === idB) || (w.a === idB && w.b === idA))) {
        updateStatus("이미 연결되어 있습니다 (Wire already exists between these terminals).", true);
        return;
      }
      const color = wireColors[wires.length % wireColors.length];
      wires.push({ a: idA, b: idB, id: `w_${Date.now()}`, color });
      renderWires();
      evaluateCircuit();
    }

    function removeWire(id) {
      wires = wires.filter(w => w.id !== id);
      renderWires();
      evaluateCircuit();
    }

    function clearWires() {
      wires = [];
      document.querySelectorAll('.hint-flash').forEach(el => el.classList.remove('hint-flash'));
      renderWires();
      evaluateCircuit();
      updateStatus("초기화 완료. (All wires cleared. Ready to build.)");
    }

    function generatePCBPath(idA, x1, y1, idB, x2, y2, index = 0) {
      const getDir = (id) => id.includes('_bot') ? 'down' : 'up';
      const getChannelY = (y, dir, offset) => {
         // Top row items (Power, PB, Lamps) vs Bottom row items (Relays)
         if (y < 270) return dir === 'up' ? 20 + offset : 240 - offset; 
         return dir === 'up' ? 255 + offset : 460 + offset; 
      };

      const offset1 = (index % 6) * 4;
      const offset2 = ((index + 3) % 6) * 4;
      const cy1 = getChannelY(y1, getDir(idA), offset1);
      const cy2 = getChannelY(y2, getDir(idB), offset2);

      if (Math.abs(cy1 - cy2) < 40 && ((y1 < 270 && y2 < 270) || (y1 > 270 && y2 > 270))) {
         const midY = (cy1 + cy2) / 2;
         return `M ${x1} ${y1} L ${x1} ${midY} L ${x2} ${midY} L ${x2} ${y2}`;
      }

      // Safe X gaps threading through the new layout:
      // Power (180), PB1 (315), PB2 (450), PB3 (585), RL (720), GL (840)
      const safeX = [20, 188, 322, 458, 602, 730, 850, 960];
      let bestX = safeX[0];
      let minCost = Infinity;
      
      for (let sx of safeX) {
          let cost = Math.abs(x1 - sx) + Math.abs(x2 - sx);
          if (cost < minCost) { minCost = cost; bestX = sx; }
      }
      
      const trunkX = bestX + (index % 5) * 4 - 8;
      return `M ${x1} ${y1} L ${x1} ${cy1} L ${trunkX} ${cy1} L ${trunkX} ${cy2} L ${x2} ${cy2} L ${x2} ${y2}`;
    }

    function renderWires() {
      wireLayer.innerHTML = '<path id="temp-wire" class="wire-temp" d="" />';
      const rect = board.getBoundingClientRect();
      
      wires.forEach((w, i) => {
        const tA = document.getElementById(w.a);
        const tB = document.getElementById(w.b);
        if(!tA || !tB) return;

        const rA = tA.getBoundingClientRect();
        const rB = tB.getBoundingClientRect();
        
        const x1 = rA.left - rect.left + (rA.width/2);
        const y1 = rA.top - rect.top + (rA.height/2);
        const x2 = rB.left - rect.left + (rB.width/2);
        const y2 = rB.top - rect.top + (rB.height/2);

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('class', 'wire-path');
        path.setAttribute('d', generatePCBPath(w.a, x1, y1, w.b, x2, y2, i));
        path.setAttribute('stroke', w.color);
        path.onclick = () => removeWire(w.id);
        
        wireLayer.appendChild(path);
      });

      document.getElementById('wire-count').innerText = wires.length;
      if (wires.length === 0) {
        wireContainer.innerHTML = `<div style="font-size: 0.75rem; color: #64748b; padding: 0.25rem;">연결 없음 (No connections).</div>`;
      } else {
        wireContainer.innerHTML = wires.map(w => `
          <div class="wire-item">
            <span style="border-left: 4px solid ${w.color}; padding-left: 6px;">
              ${w.a.toUpperCase().replace(/_/g, ' ')} ↔ ${w.b.toUpperCase().replace(/_/g, ' ')}
            </span>
            <button onclick="removeWire('${w.id}')">삭제 (Remove)</button>
          </div>
        `).join('');
      }
    }

    // --- 5. LOGIC ENGINE (PHYSICS/GRAPH SOLVER) ---
    function pressPB(id, isPressed) {
      state[id] = isPressed;
      const btn = document.getElementById(`btn_${id}`);
      if(isPressed) btn.classList.add('pressed');
      else btn.classList.remove('pressed');
      evaluateCircuit();
    }

    function evaluateCircuit() {
      let changed = true;
      let iterations = 0;
      let graph = {};
      
      const addEdge = (u, v) => {
        if(!u || !v) return;
        if(!graph[u]) graph[u] = [];
        if(!graph[v]) graph[v] = [];
        graph[u].push(v);
        graph[v].push(u);
      };

      const getConnected = (startNode) => {
        let visited = new Set();
        if(!graph[startNode]) return visited;
        let queue = [startNode];
        visited.add(startNode);
        while(queue.length > 0) {
          let node = queue.shift();
          graph[node].forEach(neighbor => {
            if(!visited.has(neighbor)) {
              visited.add(neighbor);
              queue.push(neighbor);
            }
          });
        }
        return visited;
      };

      while(changed && iterations < 10) {
        changed = false;
        iterations++;
        graph = {};

        wires.forEach(w => addEdge(w.a, w.b));

        [1, 2, 3].forEach(i => {
          let pb = `pb${i}`;
          if (state[pb]) addEdge(`${pb}_no_top`, `${pb}_no_bot`); 
          else addEdge(`${pb}_nc_top`, `${pb}_nc_bot`);
        });

        [1, 2].forEach(i => {
          let x = `x${i}`;
          if (state[x]) {
            for(let j=1; j<=4; j++) addEdge(`${x}_no${j}_top`, `${x}_no${j}_bot`);
          } else {
            for(let j=1; j<=4; j++) addEdge(`${x}_nc${j}_top`, `${x}_nc${j}_bot`);
          }
        });

        let rNet = getConnected('pow_R');
        let tNet = getConnected('pow_T');

        isShortCircuit = rNet.has('pow_T') || tNet.has('pow_R');
        if (isShortCircuit) { rNet = new Set(); tNet = new Set(); }

        [1, 2].forEach(i => {
          let x = `x${i}`;
          let top = `${x}_coil_top`;
          let bot = `${x}_coil_bot`;
          let hasR = rNet.has(top) || rNet.has(bot);
          let hasT = tNet.has(top) || tNet.has(bot);
          let isEnergized = hasR && hasT;
          
          if (state[x] !== isEnergized) {
            state[x] = isEnergized;
            changed = true; 
          }
        });

        ['rl', 'gl'].forEach(l => {
          let top = `${l}_top`;
          let bot = `${l}_bot`;
          let hasR = rNet.has(top) || rNet.has(bot);
          let hasT = tNet.has(top) || tNet.has(bot);
          state[l] = hasR && hasT;
        });
      }

      if (isShortCircuit) {
        statusPanel.className = 'status-bar short';
        statusPanel.innerHTML = "⚠️ 단락 경고! R상과 T상이 직접 연결되었습니다. (SHORT CIRCUIT DETECTED!)";
      } else {
        statusPanel.className = 'status-bar';
        statusPanel.innerHTML = "정상. 버튼을 눌러 논리 회로를 테스트하세요. (Circuit ready. Press buttons to test flow.)";
      }

      [1, 2].forEach(i => {
        const ind = document.getElementById(`ind_x${i}`);
        if(state[`x${i}`]) ind.classList.add('on');
        else ind.classList.remove('on');
      });

      ['rl', 'gl'].forEach(l => {
        const dome = document.getElementById(`dome_${l}`);
        if(state[l]) dome.classList.add('on');
        else dome.classList.remove('on');
      });
    }

    function showHint() {
      const lessonKey = document.getElementById('lesson-select').value;
      const targetWires = lessons[lessonKey];
      
      // Clear previous hints
      document.querySelectorAll('.hint-flash').forEach(el => el.classList.remove('hint-flash'));

      for (let expected of targetWires) {
        // Check if wire already exists (bidirectional check)
        const exists = wires.some(w => 
          (w.a === expected.a && w.b === expected.b) || 
          (w.a === expected.b && w.b === expected.a)
        );
        
        if (!exists) {
          const tA = document.getElementById(expected.a);
          const tB = document.getElementById(expected.b);
          if (tA && tB) {
            tA.classList.add('hint-flash');
            tB.classList.add('hint-flash');
            updateStatus(`💡 힌트 (Hint): 깜빡이는 두 단자를 연결하세요. (Connect the two flashing terminals)`);
          }
          return;
        }
      }
      
      updateStatus("모든 연결이 완료되었습니다! (All connections match the target diagram!)", false);
    }

    function loadLessonTarget() {
      const lessonKey = document.getElementById('lesson-select').value;
      const targetWires = lessons[lessonKey];
      clearWires();
      
      targetWires.forEach((w, i) => {
        setTimeout(() => { addWire(w.a, w.b); }, i * 100); 
      });
      updateStatus(`정답을 불러왔습니다 (Loaded target layout)`);
    }

    function updateStatus(msg, isError = false) {
      if(isShortCircuit) return; 
      statusPanel.className = `status-bar ${isError ? 'error' : ''}`;
      statusPanel.innerHTML = msg;
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const btn = document.getElementById('sidebar-toggle-btn');
      sidebar.classList.toggle('collapsed');
      
      if (sidebar.classList.contains('collapsed')) {
        btn.innerText = '사이드바 보이기 (Show Sidebar)';
      } else {
        btn.innerText = '사이드바 숨기기 (Hide Sidebar)';
      }
      
      // Redraw wires smoothly after layout changes width so wires remain pinned to terminals
      setTimeout(renderWires, 300);
    }

    window.addEventListener('resize', renderWires);
    scrollContainer.addEventListener('scroll', () => { if (wires.length > 0) renderWires(); });

    buildHardware();
  </script>
</body>
