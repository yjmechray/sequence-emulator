<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sequence Control Wiring Emulator</title>
  <style>
    :root {
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #1e293b;
      --border: #cbd5e1;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #ef4444;
      --success: #10b981;
      
      /* Panel Colors */
      --panel-bg: linear-gradient(180deg, #e2e8f0 0%, #cbd5e1 100%);
      --panel-border: #94a3b8;
      
      /* Terminal Colors */
      --term-red: radial-gradient(circle at 30% 30%, #fca5a5, #dc2626 40%, #7f1d1d);
      --term-yellow: radial-gradient(circle at 30% 30%, #fef08a, #eab308 40%, #854d0e);
      --term-blue: radial-gradient(circle at 30% 30%, #93c5fd, #2563eb 40%, #1e3a8a);
      --term-black: radial-gradient(circle at 30% 30%, #64748b, #1e293b 40%, #020617);
    }

    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Header & Toolbar */
    header {
      background: var(--card);
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      z-index: 10;
    }

    .title-area h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
    }

    .title-area p {
      margin: 0.25rem 0 0;
      font-size: 0.875rem;
      color: #64748b;
    }

    .controls {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    select, button {
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      font-size: 0.875rem;
      background: var(--card);
      cursor: pointer;
      transition: all 0.2s;
    }

    select { min-width: 200px; }
    
    button:hover { background: #f8fafc; }
    
    button.primary {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      font-weight: 500;
    }
    button.primary:hover { background: var(--primary-hover); }

    /* Main Workspace */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Left Sidebar: Instructions & Status */
    .sidebar {
      width: 320px;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 5;
    }

    .sidebar-section {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-section h2 {
      margin: 0 0 1rem;
      font-size: 1rem;
    }

    .status-alert {
      padding: 1rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      line-height: 1.5;
      background: #eff6ff;
      color: #1e3a8a;
      border: 1px solid #bfdbfe;
    }

    .status-alert.error {
      background: #fef2f2;
      color: #991b1b;
      border-color: #fecaca;
    }

    .status-alert.short {
      background: #fef2f2;
      color: #dc2626;
      border-color: #ef4444;
      font-weight: bold;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .wire-list {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
    }

    .wire-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 0.25rem;
      margin-bottom: 0.5rem;
      font-size: 0.75rem;
    }

    .wire-item button {
      padding: 0.25rem 0.5rem;
      background: #fee2e2;
      color: #dc2626;
      border: none;
      border-radius: 0.25rem;
    }

    /* Right Area: The Physical Board */
    .board-container {
      flex: 1;
      position: relative;
      background: radial-gradient(circle at 50% 50%, #f8fafc, #e2e8f0);
      overflow: auto;
      padding: 2rem;
    }

    .board {
      position: relative;
      width: 1000px;
      height: 700px;
      background: #d1d5db;
      border: 4px solid #94a3b8;
      border-radius: 12px;
      box-shadow: 
        inset 0 0 20px rgba(0,0,0,0.05),
        0 20px 25px -5px rgba(0, 0, 0, 0.1);
      margin: 0 auto;
    }

    /* SVG Layer for Wires */
    #wire-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 20;
    }

    .wire-path {
      fill: none;
      stroke-width: 6;
      stroke-linecap: round;
      filter: drop-shadow(2px 4px 2px rgba(0,0,0,0.2));
      pointer-events: stroke;
      cursor: pointer;
      transition: stroke-width 0.2s;
    }
    
    .wire-path:hover {
      stroke-width: 9;
    }

    .wire-temp {
      fill: none;
      stroke: #94a3b8;
      stroke-width: 5;
      stroke-dasharray: 8 8;
      stroke-linecap: round;
      pointer-events: none;
    }

    /* Hardware Modules */
    .module {
      position: absolute;
      background: var(--panel-bg);
      border: 2px solid var(--panel-border);
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.6);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.5rem;
    }

    .module-screws::before, .module-screws::after {
      content: '';
      position: absolute;
      width: 6px; height: 6px;
      background: #64748b;
      border-radius: 50%;
      box-shadow: inset 1px 1px 2px rgba(0,0,0,0.5);
    }
    .module-screws::before { top: 6px; left: 6px; }
    .module-screws::after { bottom: 6px; right: 6px; }

    .module-title {
      font-size: 0.75rem;
      font-weight: bold;
      background: #94a3b8;
      color: white;
      padding: 0.1rem 1rem;
      border-radius: 4px;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Terminals (Sockets) */
    .terminal-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .terminal {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 3px solid #334155;
      box-shadow: 0 1px 2px rgba(255,255,255,0.8), inset 0 2px 4px rgba(0,0,0,0.6);
      position: relative;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .terminal::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 10px; height: 10px;
      background: #020617;
      border-radius: 50%;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
    }

    .terminal:hover { transform: scale(1.15); }
    .terminal.selected {
      transform: scale(1.15);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.5);
    }

    .term-red { background: var(--term-red); }
    .term-yellow { background: var(--term-yellow); }
    .term-blue { background: var(--term-blue); }

    /* Specific Module Layouts */
    .grid-row { display: flex; gap: 1rem; }
    .grid-col { display: flex; flex-direction: column; gap: 0.5rem; align-items: center; }
    
    .symbol {
      font-size: 0.7rem;
      color: #475569;
      font-weight: 600;
      text-align: center;
      margin: 0.25rem 0;
    }

    /* Push Button Elements */
    .pb-actuator {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 2px solid #94a3b8;
      background: radial-gradient(circle at 30% 30%, #f8fafc, #cbd5e1 60%);
      box-shadow: 0 4px 0 #94a3b8, 0 5px 5px rgba(0,0,0,0.2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.75rem;
      margin-bottom: 0.5rem;
      user-select: none;
      transition: all 0.1s;
    }
    
    .pb-actuator:active, .pb-actuator.pressed {
      transform: translateY(4px);
      box-shadow: 0 0 0 #94a3b8, 0 1px 2px rgba(0,0,0,0.2);
    }

    /* Lamp Elements */
    .lamp-dome {
      width: 60px; height: 60px;
      border-radius: 50%;
      margin-bottom: 1rem;
      border: 4px solid #64748b;
      box-shadow: inset 0 4px 8px rgba(255,255,255,0.4), 0 4px 6px rgba(0,0,0,0.2);
      transition: all 0.2s;
    }
    
    .lamp-red { background: radial-gradient(circle at 30% 30%, #fca5a5, #991b1b); }
    .lamp-green { background: radial-gradient(circle at 30% 30%, #86efac, #166534); }
    
    .lamp-red.on {
      background: radial-gradient(circle at 40% 40%, #ffbaba, #ff0000);
      box-shadow: 0 0 30px #ff0000, inset 0 4px 8px rgba(255,255,255,0.6);
    }
    
    .lamp-green.on {
      background: radial-gradient(circle at 40% 40%, #baffc9, #00ff00);
      box-shadow: 0 0 30px #00ff00, inset 0 4px 8px rgba(255,255,255,0.6);
    }

    /* Relay Indicator */
    .relay-indicator {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #475569;
      margin-bottom: 0.5rem;
    }
    .relay-indicator.on {
      background: #ef4444;
      box-shadow: 0 0 8px #ef4444;
    }
  </style>
</head>
<body>

  <header>
    <div class="title-area">
      <h1>Sequence Control Emulator</h1>
      <p>Interactive graph-based physics engine for electrical wiring.</p>
    </div>
    <div class="controls">
      <select id="lesson-select">
        <option value="a_contact">1. a접점 회로 (a-contact circuit)</option>
        <option value="b_contact">2. b접점 회로 (b-contact circuit)</option>
        <option value="c_contact">3. c접점 회로 (c-contact circuit)</option>
        <option value="and_circuit">4. 직렬(AND) 회로 (Series AND)</option>
        <option value="or_circuit">5. 병렬(OR) 회로 (Parallel OR)</option>
      </select>
      <button onclick="clearWires()">Clear Wires</button>
      <button class="primary" onclick="loadLessonTarget()">Load Target Wiring</button>
    </div>
  </header>

  <div class="workspace">
    <div class="sidebar">
      <div class="sidebar-section">
        <h2>Circuit Status</h2>
        <div id="status-panel" class="status-alert">
          Click two terminals to connect a wire. <br><br>
          Press the physical buttons on the board to test the electrical flow. The simulation engine calculates paths automatically.
        </div>
      </div>
      <div class="wire-list">
        <h2>Connections (<span id="wire-count">0</span>)</h2>
        <div id="wire-container"></div>
      </div>
    </div>

    <div class="board-container" id="scroll-container">
      <div class="board" id="board">
        <svg id="wire-layer">
          <path id="temp-wire" class="wire-temp" d="" />
        </svg>
      </div>
    </div>
  </div>

  <script>
    // --- 1. ARCHITECTURE & DEFINITIONS ---
    // The visual and logical definitions of the hardware modules.
    const board = document.getElementById('board');
    const wireLayer = document.getElementById('wire-layer');
    const tempWire = document.getElementById('temp-wire');
    const statusPanel = document.getElementById('status-panel');
    const wireContainer = document.getElementById('wire-container');
    const scrollContainer = document.getElementById('scroll-container');

    let wires = [];
    let selectedTerminal = null;
    let isShortCircuit = false;
    let mousePos = { x: 0, y: 0 };
    
    // UI State for interactive components
    const state = {
      pb1: false, pb2: false, pb3: false,
      x1: false, x2: false,
      rl: false, gl: false
    };

    const wireColors = ['#e11d48', '#2563eb', '#16a34a', '#d97706', '#4f46e5', '#db2777'];

    // --- 2. LESSON DATA ---
    const lessons = {
      a_contact: [
        {a: 'pow_R', b: 'pb1_no_top'},
        {a: 'pb1_no_bot', b: 'x1_coil_top'},
        {a: 'x1_coil_bot', b: 'pow_T'},
        {a: 'pow_R', b: 'x1_no1_top'},
        {a: 'x1_no1_bot', b: 'rl_top'},
        {a: 'rl_bot', b: 'pow_T'}
      ],
      b_contact: [
        {a: 'pow_R', b: 'pb1_nc_top'},
        {a: 'pb1_nc_bot', b: 'x1_coil_top'},
        {a: 'x1_coil_bot', b: 'pow_T'},
        {a: 'pow_R', b: 'x1_nc1_top'},
        {a: 'x1_nc1_bot', b: 'gl_top'},
        {a: 'gl_bot', b: 'pow_T'}
      ],
      c_contact: [
        {a: 'pow_R', b: 'pb1_no_top'},
        {a: 'pb1_no_bot', b: 'x1_coil_top'},
        {a: 'x1_coil_bot', b: 'pow_T'},
        {a: 'pow_R', b: 'x1_no1_top'},
        {a: 'x1_no1_bot', b: 'rl_top'},
        {a: 'rl_bot', b: 'pow_T'},
        {a: 'pow_R', b: 'x1_nc1_top'},
        {a: 'x1_nc1_bot', b: 'gl_top'},
        {a: 'gl_bot', b: 'pow_T'}
      ],
      and_circuit: [
        {a: 'pow_R', b: 'pb3_nc_top'},
        {a: 'pb3_nc_bot', b: 'pb1_no_top'},
        {a: 'pb1_no_bot', b: 'x1_coil_top'},
        {a: 'x1_coil_bot', b: 'pow_T'},
        {a: 'pb3_nc_bot', b: 'x1_no1_top'},
        {a: 'x1_no1_bot', b: 'x1_coil_top'}, // Latch X1
        
        {a: 'pb3_nc_bot', b: 'pb2_no_top'},
        {a: 'pb2_no_bot', b: 'x2_coil_top'},
        {a: 'x2_coil_bot', b: 'pow_T'},
        {a: 'pb3_nc_bot', b: 'x2_no1_top'},
        {a: 'x2_no1_bot', b: 'x2_coil_top'}, // Latch X2
        
        {a: 'pb3_nc_bot', b: 'x1_no2_top'},
        {a: 'x1_no2_bot', b: 'x2_no2_top'}, // Series
        {a: 'x2_no2_bot', b: 'rl_top'},
        {a: 'rl_bot', b: 'pow_T'}
      ],
      or_circuit: [
        {a: 'pow_R', b: 'pb3_nc_top'},
        
        {a: 'pb3_nc_bot', b: 'pb1_no_top'},
        {a: 'pb1_no_bot', b: 'x1_coil_top'},
        {a: 'x1_coil_bot', b: 'pow_T'},
        {a: 'pb3_nc_bot', b: 'x1_no1_top'},
        {a: 'x1_no1_bot', b: 'x1_coil_top'},
        
        {a: 'pb3_nc_bot', b: 'pb2_no_top'},
        {a: 'pb2_no_bot', b: 'x2_coil_top'},
        {a: 'x2_coil_bot', b: 'pow_T'},
        {a: 'pb3_nc_bot', b: 'x2_no1_top'},
        {a: 'x2_no1_bot', b: 'x2_coil_top'},
        
        {a: 'pb3_nc_bot', b: 'x1_no2_top'},
        {a: 'x1_no2_bot', b: 'rl_top'},
        {a: 'pb3_nc_bot', b: 'x2_no2_top'}, // Parallel
        {a: 'x2_no2_bot', b: 'rl_top'},
        
        {a: 'rl_bot', b: 'pow_T'}
      ]
    };

    // --- 3. HARDWARE RENDERING ---
    function createModule(id, x, y, width, height, title, contentHTML) {
      const mod = document.createElement('div');
      mod.className = 'module module-screws';
      mod.id = id;
      mod.style.left = `${x}px`;
      mod.style.top = `${y}px`;
      mod.style.width = `${width}px`;
      mod.style.height = `${height}px`;
      
      mod.innerHTML = `
        <div class="module-title">${title}</div>
        ${contentHTML}
      `;
      board.appendChild(mod);
    }

    function buildHardware() {
      // 1. Power Supply
      createModule('power', 40, 40, 140, 100, 'POWER', `
        <div class="grid-row" style="margin-top:10px;">
          <div class="grid-col"><div class="terminal term-red" id="pow_R"></div><div class="symbol">R</div></div>
          <div class="grid-col"><div class="terminal term-red" id="pow_T"></div><div class="symbol">T</div></div>
        </div>
      `);

      // 2. Push Buttons (Group of 3)
      let pbHTML = '<div class="grid-row" style="gap:1.5rem;">';
      for(let i=1; i<=3; i++) {
        pbHTML += `
          <div class="grid-col">
            <div class="pb-actuator" id="btn_pb${i}" onmousedown="pressPB('pb${i}', true)" onmouseup="pressPB('pb${i}', false)" onmouseleave="pressPB('pb${i}', false)">PB${i}</div>
            <div class="grid-row" style="gap:10px;">
              <div class="grid-col">
                <div class="terminal term-yellow" id="pb${i}_no_top"></div>
                <div class="symbol">NO</div>
                <div class="terminal term-yellow" id="pb${i}_no_bot"></div>
              </div>
              <div class="grid-col">
                <div class="terminal term-blue" id="pb${i}_nc_top"></div>
                <div class="symbol">NC</div>
                <div class="terminal term-blue" id="pb${i}_nc_bot"></div>
              </div>
            </div>
          </div>`;
      }
      pbHTML += '</div>';
      createModule('pbs', 220, 40, 360, 180, 'PUSH BUTTONS', pbHTML);

      // 3. Relays (X1, X2)
      [1, 2].forEach((num, idx) => {
        let relayHTML = `<div class="relay-indicator" id="ind_x${num}"></div><div class="grid-row" style="gap:8px;">`;
        // Coil
        relayHTML += `<div class="grid-col"><div class="terminal term-red" id="x${num}_coil_top"></div><div class="symbol">Coil</div><div class="terminal term-red" id="x${num}_coil_bot"></div></div>`;
        // 4x NO
        for(let i=1; i<=4; i++) {
          relayHTML += `<div class="grid-col"><div class="terminal term-yellow" id="x${num}_no${i}_top"></div><div class="symbol">NO</div><div class="terminal term-yellow" id="x${num}_no${i}_bot"></div></div>`;
        }
        // 4x NC
        for(let i=1; i<=4; i++) {
          relayHTML += `<div class="grid-col"><div class="terminal term-blue" id="x${num}_nc${i}_top"></div><div class="symbol">NC</div><div class="terminal term-blue" id="x${num}_nc${i}_bot"></div></div>`;
        }
        relayHTML += '</div>';
        createModule(`relay${num}`, 40 + (idx * 380), 260, 360, 160, `RELAY ${num} (X${num})`, relayHTML);
      });

      // 4. Lamps (RL, GL)
      const lamps = [
        { id: 'rl', color: 'red', name: 'RL', x: 820 },
        { id: 'gl', color: 'green', name: 'GL', x: 910 }
      ];
      lamps.forEach(l => {
        createModule(`lamp_${l.id}`, l.x, 260, 80, 220, l.name, `
          <div class="lamp-dome lamp-${l.color}" id="dome_${l.id}"></div>
          <div class="grid-col">
            <div class="terminal term-red" id="${l.id}_top"></div>
            <div class="terminal term-red" id="${l.id}_bot"></div>
          </div>
        `);
      });

      // Attach event listeners to all generated terminals
      document.querySelectorAll('.terminal').forEach(term => {
        term.addEventListener('click', (e) => handleTerminalClick(e, term));
      });
    }

    // --- 4. INTERACTION & DRAWING ---
    function handleTerminalClick(e, term) {
      if (!selectedTerminal) {
        selectedTerminal = term;
        term.classList.add('selected');
        updateStatus("Select a second terminal to connect the wire.");
      } else {
        if (selectedTerminal !== term) {
          addWire(selectedTerminal.id, term.id);
        }
        selectedTerminal.classList.remove('selected');
        selectedTerminal = null;
        tempWire.setAttribute('d', '');
      }
    }

    board.addEventListener('mousemove', (e) => {
      if (!selectedTerminal) return;
      const rect = board.getBoundingClientRect();
      // Account for container scrolling
      mousePos = {
        x: e.clientX - rect.left + scrollContainer.scrollLeft,
        y: e.clientY - rect.top + scrollContainer.scrollTop
      };
      
      const termRect = selectedTerminal.getBoundingClientRect();
      const startX = termRect.left - rect.left + (termRect.width/2) + scrollContainer.scrollLeft;
      const startY = termRect.top - rect.top + (termRect.height/2) + scrollContainer.scrollTop;
      
      tempWire.setAttribute('d', generateBezier(startX, startY, mousePos.x, mousePos.y));
    });

    function addWire(idA, idB) {
      // Prevent duplicates
      if (wires.some(w => (w.a === idA && w.b === idB) || (w.a === idB && w.b === idA))) {
        updateStatus("Wire already exists between these terminals.", true);
        return;
      }
      const color = wireColors[wires.length % wireColors.length];
      wires.push({ a: idA, b: idB, id: `w_${Date.now()}`, color });
      renderWires();
      evaluateCircuit();
    }

    function removeWire(id) {
      wires = wires.filter(w => w.id !== id);
      renderWires();
      evaluateCircuit();
    }

    function clearWires() {
      wires = [];
      renderWires();
      evaluateCircuit();
      updateStatus("All wires cleared. Ready to build.");
    }

    function generateBezier(x1, y1, x2, y2) {
      const dx = Math.abs(x2 - x1);
      const dy = Math.abs(y2 - y1);
      const drop = Math.min(dx, 100) + 40; // Simulate gravity sag
      
      return `M ${x1} ${y1} C ${x1} ${y1 + drop}, ${x2} ${y2 + drop}, ${x2} ${y2}`;
    }

    function renderWires() {
      // Keep only the temp wire
      wireLayer.innerHTML = '<path id="temp-wire" class="wire-temp" d="" />';
      
      const rect = board.getBoundingClientRect();
      
      wires.forEach(w => {
        const tA = document.getElementById(w.a);
        const tB = document.getElementById(w.b);
        if(!tA || !tB) return;

        const rA = tA.getBoundingClientRect();
        const rB = tB.getBoundingClientRect();
        
        const x1 = rA.left - rect.left + (rA.width/2) + scrollContainer.scrollLeft;
        const y1 = rA.top - rect.top + (rA.height/2) + scrollContainer.scrollTop;
        const x2 = rB.left - rect.left + (rB.width/2) + scrollContainer.scrollLeft;
        const y2 = rB.top - rect.top + (rB.height/2) + scrollContainer.scrollTop;

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('class', 'wire-path');
        path.setAttribute('d', generateBezier(x1, y1, x2, y2));
        path.setAttribute('stroke', w.color);
        path.onclick = () => removeWire(w.id);
        
        wireLayer.appendChild(path);
      });

      // Update UI list
      document.getElementById('wire-count').innerText = wires.length;
      wireContainer.innerHTML = wires.map(w => `
        <div class="wire-item">
          <span style="border-left: 4px solid ${w.color}; padding-left: 8px;">
            ${w.a.toUpperCase()} ↔ ${w.b.toUpperCase()}
          </span>
          <button onclick="removeWire('${w.id}')">Remove</button>
        </div>
      `).join('');
    }

    // --- 5. LOGIC ENGINE (PHYSICS/GRAPH SOLVER) ---
    function pressPB(id, isPressed) {
      state[id] = isPressed;
      const btn = document.getElementById(`btn_${id}`);
      if(isPressed) btn.classList.add('pressed');
      else btn.classList.remove('pressed');
      evaluateCircuit();
    }

    function evaluateCircuit() {
      let changed = true;
      let iterations = 0;
      
      // Graph representing electrical connections
      let graph = {};
      const addEdge = (u, v) => {
        if(!u || !v) return;
        if(!graph[u]) graph[u] = [];
        if(!graph[v]) graph[v] = [];
        graph[u].push(v);
        graph[v].push(u);
      };

      // Helper to find all nodes connected to a source
      const getConnected = (startNode) => {
        let visited = new Set();
        if(!graph[startNode]) return visited;
        let queue = [startNode];
        visited.add(startNode);
        while(queue.length > 0) {
          let node = queue.shift();
          graph[node].forEach(neighbor => {
            if(!visited.has(neighbor)) {
              visited.add(neighbor);
              queue.push(neighbor);
            }
          });
        }
        return visited;
      };

      // Evaluation Loop (Handles latching feedback)
      while(changed && iterations < 10) {
        changed = false;
        iterations++;
        graph = {};

        // 1. External physical wires
        wires.forEach(w => addEdge(w.a, w.b));

        // 2. Push Buttons internal logic
        [1, 2, 3].forEach(i => {
          let pb = `pb${i}`;
          if (state[pb]) {
            addEdge(`${pb}_no_top`, `${pb}_no_bot`); // NO closes
          } else {
            addEdge(`${pb}_nc_top`, `${pb}_nc_bot`); // NC stays closed
          }
        });

        // 3. Relays internal logic based on current state
        [1, 2].forEach(i => {
          let x = `x${i}`;
          if (state[x]) {
            // Energized: NO closed, NC open
            for(let j=1; j<=4; j++) addEdge(`${x}_no${j}_top`, `${x}_no${j}_bot`);
          } else {
            // De-energized: NO open, NC closed
            for(let j=1; j<=4; j++) addEdge(`${x}_nc${j}_top`, `${x}_nc${j}_bot`);
          }
        });

        // 4. Trace power lines
        let rNet = getConnected('pow_R');
        let tNet = getConnected('pow_T');

        // Check Short Circuit
        isShortCircuit = rNet.has('pow_T') || tNet.has('pow_R');

        if (isShortCircuit) {
           // Short circuit kills power locally in this basic sim
           rNet = new Set();
           tNet = new Set();
        }

        // 5. Update component states
        // Relays
        [1, 2].forEach(i => {
          let x = `x${i}`;
          let top = `${x}_coil_top`;
          let bot = `${x}_coil_bot`;
          let hasR = rNet.has(top) || rNet.has(bot);
          let hasT = tNet.has(top) || tNet.has(bot);
          let isEnergized = hasR && hasT;
          
          if (state[x] !== isEnergized) {
            state[x] = isEnergized;
            changed = true; // State changed, require re-eval for latches
          }
        });

        // Lamps
        ['rl', 'gl'].forEach(l => {
          let top = `${l}_top`;
          let bot = `${l}_bot`;
          let hasR = rNet.has(top) || rNet.has(bot);
          let hasT = tNet.has(top) || tNet.has(bot);
          state[l] = hasR && hasT;
        });
      }

      // --- 6. UPDATE VISUALS ---
      // Update Short Circuit UI
      if (isShortCircuit) {
        statusPanel.className = 'status-alert short';
        statusPanel.innerHTML = "⚠️ SHORT CIRCUIT DETECTED! R and T are connected directly.";
      } else {
        statusPanel.className = 'status-alert';
        statusPanel.innerHTML = "Circuit evaluated successfully. Press buttons to test logic flow.";
      }

      // Update Relays
      [1, 2].forEach(i => {
        const ind = document.getElementById(`ind_x${i}`);
        if(state[`x${i}`]) ind.classList.add('on');
        else ind.classList.remove('on');
      });

      // Update Lamps
      ['rl', 'gl'].forEach(l => {
        const dome = document.getElementById(`dome_${l}`);
        if(state[l]) dome.classList.add('on');
        else dome.classList.remove('on');
      });
    }

    // --- 7. LESSON MANAGEMENT ---
    function loadLessonTarget() {
      const lessonKey = document.getElementById('lesson-select').value;
      const targetWires = lessons[lessonKey];
      clearWires();
      
      targetWires.forEach((w, i) => {
        setTimeout(() => {
          addWire(w.a, w.b);
        }, i * 100); // Staggered animation
      });
      updateStatus(`Loaded target layout for: ${lessonKey}`);
    }

    function updateStatus(msg, isError = false) {
      if(isShortCircuit) return; // Don't override short circuit warning
      statusPanel.className = `status-alert ${isError ? 'error' : ''}`;
      statusPanel.innerHTML = msg;
    }

    // Init
    window.addEventListener('resize', renderWires);
    
    // Ensure scrolling doesn't break wires
    scrollContainer.addEventListener('scroll', () => {
       if (wires.length > 0) renderWires();
    });

    buildHardware();
  </script>
</body>
